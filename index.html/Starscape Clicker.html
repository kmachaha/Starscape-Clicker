<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Starscape Clicker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titleScreen" class="full-screen">
    <canvas id="titleStars"></canvas>
    <div class="title-content">
      <h1>STARSCAPE CLICKER</h1>
      <button id="startBtn">START GAME</button>
    </div>
  </div>

  <div id="gameScreen" class="full-screen hidden">
    <canvas id="bgStars"></canvas>
    <header>
      <h1>STARSCAPE CLICKER</h1>
      <div id="credits">Credits: KMAC(Kaden Couch)</div>
    </header>

  <main>
    <section class="status">
      <div>Stars: <span id="coins">0</span></div>
      <div>Per Click: <span id="perClick">1</span></div>
      <div>CPS: <span id="cps">0</span></div>
      <div>World: <span id="currentWorld">Earth</span></div>
    </section>

    <section class="click-area">
      <button id="clicker">CLICK</button>
    </section>

    <section class="shops">
      <div class="shop" id="upgrades">
        <h2>Upgrades</h2>
        <div id="upgradesList"></div>
      </div>

      <div class="shop" id="autoclickers">
        <h2>Auto-Clickers</h2>
        <div id="autosList"></div>
      </div>

      <div class="shop" id="multipliers">
        <h2>Multipliers</h2>
        <div id="multsList"></div>
      </div>

      <div class="shop" id="worlds">
        <h2>Worlds</h2>
        <div id="worldsList"></div>
      </div>
    </section>

    <button id="resetBtn" class="reset-btn">RESET GAME</button>
  </main>

  <footer>
    <small>Made with ♥ by KMAC(Kaden Couch)</small>
  </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
